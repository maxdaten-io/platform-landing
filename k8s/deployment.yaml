apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-landing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platform-landing
  template:
    metadata:
      labels:
        app: platform-landing
    spec:
      containers:
        - name: caddy
          image: caddy:2-alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: html
              mountPath: /usr/share/caddy
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: html
          configMap:
            name: platform-landing-html
